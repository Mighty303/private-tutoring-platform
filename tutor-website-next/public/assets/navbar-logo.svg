<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 46">
  <!-- Laptop screen bezel -->
  <rect x="2" y="1" width="48" height="34" rx="3.5" fill="#0f172a" stroke="#6366f1" stroke-width="1.6"/>
  <!-- Title bar -->
  <rect x="2" y="1" width="48" height="9" rx="3.5" fill="#1e1b4b"/>
  <rect x="2" y="7" width="48" height="3" fill="#1e1b4b"/>
  <!-- Traffic dots -->
  <circle cx="9" cy="5.5" r="1.8" fill="#f87171"/>
  <circle cx="15.5" cy="5.5" r="1.8" fill="#fbbf24"/>
  <circle cx="22" cy="5.5" r="1.8" fill="#4ade80"/>
  <!-- > prompt -->
  <path d="M 8 21 L 16 25 L 8 29" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor block -->
  <rect x="19" y="21.5" width="8" height="5" rx="0.75" fill="#818cf8" opacity="0.9"/>
  <!-- Second line hint -->
  <rect x="19" y="30" width="13" height="2.5" rx="0.75" fill="#6366f1" opacity="0.4"/>
  <!-- Laptop base -->
  <rect x="0" y="37" width="52" height="9" rx="3" fill="#0f172a" stroke="#6366f1" stroke-width="1.6"/>
  <!-- Hinge shadow -->
  <rect x="2" y="35.5" width="48" height="2.5" fill="#1e1b4b" rx="1"/>
  <!-- Trackpad -->
  <rect x="17" y="40" width="18" height="4" rx="1.5" fill="none" stroke="#4f46e5" stroke-width="1.1"/>
</svg>
