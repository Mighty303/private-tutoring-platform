<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Laptop lid -->
  <rect x="3" y="2" width="58" height="37" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="6.5" y="5.5" width="51" height="30" rx="2" fill="#0f172a"/>
  <!-- Terminal window card -->
  <rect x="9" y="8" width="46" height="25" rx="2" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
  <!-- Titlebar -->
  <rect x="9" y="8" width="46" height="6" rx="2" fill="#1e293b"/>
  <rect x="9" y="12" width="46" height="2" fill="#1e293b"/>
  <!-- Traffic dots -->
  <circle cx="13.5" cy="11" r="1.8" fill="#f87171"/>
  <circle cx="18.5" cy="11" r="1.8" fill="#fbbf24"/>
  <circle cx="23.5" cy="11" r="1.8" fill="#4ade80"/>
  <!-- > prompt -->
  <path d="M 13 21 L 20 24.5 L 13 28" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor block -->
  <rect x="22" y="22" width="7" height="4" rx="0.75" fill="#6366f1" opacity="0.9"/>

  <!-- Keyboard base (trapezoid) -->
  <path d="M 3 40 L 61 40 L 64 63 Q 64 64 62 64 L 2 64 Q 0 64 0 63 Z" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <!-- Hinge shadow -->
  <rect x="3" y="39.5" width="58" height="2" fill="#0f172a" rx="1"/>

  <!-- Key row 1 — 10 keys -->
  <rect x="5"    y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="10.4" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="15.8" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="21.2" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="26.6" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="32"   y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="37.4" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="42.8" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="48.2" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="53.6" y="42.5" width="4" height="3" rx="0.5" fill="#334155"/>

  <!-- Key row 2 — 9 keys (offset) -->
  <rect x="6.5"  y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="12.2" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="17.9" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="23.6" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="29.3" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="35"   y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="40.7" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="46.4" y="47" width="4" height="3" rx="0.5" fill="#334155"/>
  <rect x="52.1" y="47" width="4" height="3" rx="0.5" fill="#334155"/>

  <!-- Spacebar -->
  <rect x="18" y="51.5" width="28" height="3" rx="0.75" fill="#334155"/>

  <!-- Trackpad -->
  <rect x="19" y="56.5" width="26" height="5.5" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
</svg>
